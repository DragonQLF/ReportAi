services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reportai
      POSTGRES_PASSWORD: reportai
      POSTGRES_DB: reportai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://reportai:reportai@postgres:5432/reportai
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      BASE_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:4000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
